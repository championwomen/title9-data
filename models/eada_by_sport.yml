version: 2

sources:
  - name: raw
    schema: public
    tables:
      - name: raw_eada_by_sport
        description: Raw EADA long-format by-sport data (2009-2025), one row per sport per institution per year.

models:
  - name: eada_by_sport
    description: |
      EADA data by sport in long format. One row per sport per institution per year per sex.
      Includes participation, revenue, expenses, operating expenses, and full head/assistant
      coaching-staff breakdowns (full/part-time, by coach sex, and university-employee status).
      Coed teams are split into Male/Female rows (is_coed_sport=true); coed coaching counts are
      attributed to the Male row to avoid double-counting.
    columns:
      - name: year
        tests:
          - not_null
        meta:
          dimension:
            label: "Year"
            type: date
            time_intervals: ['YEAR']
            sql: to_date(CAST(${TABLE}.year AS CHAR(4)), 'yyyy')
            group_label: "Time Period"
      - name: unitid
        meta:
          dimension:
            label: "Unit ID"
            type: string
            group_label: "School Details"
      - name: ope_id
        meta:
          dimension:
            label: "OPE ID"
            type: string
            group_label: "School Details"
      - name: institution_name
        meta:
          dimension:
            label: "Institution Name"
            type: string
            group_label: "School Details"
      - name: state
        meta:
          dimension:
            label: "State"
            type: string
            group_label: "School Details"
      - name: classification
        meta:
          dimension:
            label: "Classification"
            type: string
            group_label: "School Details"
      - name: sector
        meta:
          dimension:
            label: "Sector"
            type: string
            group_label: "School Details"
      - name: male_undergraduates
        meta:
          dimension:
            label: "Male Undergraduates"
            type: number
            group_label: "School Details"
            hidden: true
      - name: female_undergraduates
        meta:
          dimension:
            label: "Female Undergraduates"
            type: number
            group_label: "School Details"
            hidden: true
      - name: total_undergraduates
        meta:
          dimension:
            label: "Total Undergraduates"
            type: number
            group_label: "School Details"
            hidden: true
      - name: sport_code
        meta:
          dimension:
            label: "Sport Code"
            type: string
            group_label: "Sport Details"
            hidden: true
      - name: sport_name
        meta:
          dimension:
            label: "Sport"
            type: string
            group_label: "Sport Details"
      - name: sex
        tests:
          - not_null
          - accepted_values:
              values: ['Male', 'Female']
        meta:
          dimension:
            label: "Sex"
            type: string
            group_label: "Sport Details"
      - name: is_coed_sport
        meta:
          dimension:
            label: "Coed Sport"
            type: boolean
            group_label: "Sport Details"
      - name: participation
        meta:
          dimension:
            label: "Participation"
            type: number
            hidden: true
            group_label: "Sport Metrics"
          metrics:
            total_participation:
              label: "Total Participation"
              type: sum
              sql: ${TABLE}.participation
              round: 0
              group_label: "Sport Metrics"
      - name: revenue
        meta:
          dimension:
            label: "Revenue"
            type: number
            hidden: true
            group_label: "Sport Finances"
          metrics:
            total_revenue:
              label: "Total Revenue"
              type: sum
              sql: ${TABLE}.revenue
              format: 'usd'
              round: 0
              group_label: "Sport Finances"
      - name: total_expenses
        meta:
          dimension:
            label: "Total Expenses"
            type: number
            hidden: true
            group_label: "Sport Finances"
          metrics:
            total_total_expenses:
              label: "Total Total Expenses"
              type: sum
              sql: ${TABLE}.total_expenses
              format: 'usd'
              round: 0
              group_label: "Sport Finances"
      - name: operating_expenses
        meta:
          dimension:
            label: "Operating Expenses"
            type: number
            hidden: true
            group_label: "Sport Finances"
          metrics:
            total_operating_expenses:
              label: "Total Operating Expenses"
              type: sum
              sql: ${TABLE}.operating_expenses
              format: 'usd'
              round: 0
              group_label: "Sport Finances"
      - name: operating_expense_per_participant
        meta:
          dimension:
            label: "Operating Expense Per Participant"
            type: number
            hidden: true
            group_label: "Sport Finances"
          metrics:
            total_operating_expense_per_participant:
              label: "Total Operating Expense Per Participant"
              type: sum
              sql: ${TABLE}.operating_expense_per_participant
              format: 'usd'
              round: 0
              group_label: "Sport Finances"
      - name: ft_head_coaches_male
        meta:
          dimension:
            label: "FT Head Coaches Male"
            type: number
            hidden: true
            group_label: "Coaching — Head"
          metrics:
            total_ft_head_coaches_male:
              label: "Total FT Head Coaches Male"
              type: sum
              sql: ${TABLE}.ft_head_coaches_male
              round: 0
              group_label: "Coaching — Head"
      - name: pt_head_coaches_male
        meta:
          dimension:
            label: "PT Head Coaches Male"
            type: number
            hidden: true
            group_label: "Coaching — Head"
          metrics:
            total_pt_head_coaches_male:
              label: "Total PT Head Coaches Male"
              type: sum
              sql: ${TABLE}.pt_head_coaches_male
              round: 0
              group_label: "Coaching — Head"
      - name: ft_head_coaches_female
        meta:
          dimension:
            label: "FT Head Coaches Female"
            type: number
            hidden: true
            group_label: "Coaching — Head"
          metrics:
            total_ft_head_coaches_female:
              label: "Total FT Head Coaches Female"
              type: sum
              sql: ${TABLE}.ft_head_coaches_female
              round: 0
              group_label: "Coaching — Head"
      - name: pt_head_coaches_female
        meta:
          dimension:
            label: "PT Head Coaches Female"
            type: number
            hidden: true
            group_label: "Coaching — Head"
          metrics:
            total_pt_head_coaches_female:
              label: "Total PT Head Coaches Female"
              type: sum
              sql: ${TABLE}.pt_head_coaches_female
              round: 0
              group_label: "Coaching — Head"
      - name: total_head_coaches
        meta:
          dimension:
            label: "Total Head Coaches"
            type: number
            hidden: true
            group_label: "Coaching — Head"
          metrics:
            total_total_head_coaches:
              label: "Total Total Head Coaches"
              type: sum
              sql: ${TABLE}.total_head_coaches
              round: 0
              group_label: "Coaching — Head"
      - name: ft_head_coach_univ_emp_male
        meta:
          dimension:
            label: "FT Head Coach Univ. Employee Male"
            type: number
            hidden: true
            group_label: "Coaching — Head"
          metrics:
            total_ft_head_coach_univ_emp_male:
              label: "Total FT Head Coach Univ. Employee Male"
              type: sum
              sql: ${TABLE}.ft_head_coach_univ_emp_male
              round: 0
              group_label: "Coaching — Head"
      - name: pt_head_coach_univ_emp_male
        meta:
          dimension:
            label: "PT Head Coach Univ. Employee Male"
            type: number
            hidden: true
            group_label: "Coaching — Head"
          metrics:
            total_pt_head_coach_univ_emp_male:
              label: "Total PT Head Coach Univ. Employee Male"
              type: sum
              sql: ${TABLE}.pt_head_coach_univ_emp_male
              round: 0
              group_label: "Coaching — Head"
      - name: ft_head_coach_univ_emp_female
        meta:
          dimension:
            label: "FT Head Coach Univ. Employee Female"
            type: number
            hidden: true
            group_label: "Coaching — Head"
          metrics:
            total_ft_head_coach_univ_emp_female:
              label: "Total FT Head Coach Univ. Employee Female"
              type: sum
              sql: ${TABLE}.ft_head_coach_univ_emp_female
              round: 0
              group_label: "Coaching — Head"
      - name: pt_head_coach_univ_emp_female
        meta:
          dimension:
            label: "PT Head Coach Univ. Employee Female"
            type: number
            hidden: true
            group_label: "Coaching — Head"
          metrics:
            total_pt_head_coach_univ_emp_female:
              label: "Total PT Head Coach Univ. Employee Female"
              type: sum
              sql: ${TABLE}.pt_head_coach_univ_emp_female
              round: 0
              group_label: "Coaching — Head"
      - name: ft_asst_coaches_male
        meta:
          dimension:
            label: "FT Asst Coaches Male"
            type: number
            hidden: true
            group_label: "Coaching — Assistant"
          metrics:
            total_ft_asst_coaches_male:
              label: "Total FT Asst Coaches Male"
              type: sum
              sql: ${TABLE}.ft_asst_coaches_male
              round: 0
              group_label: "Coaching — Assistant"
      - name: pt_asst_coaches_male
        meta:
          dimension:
            label: "PT Asst Coaches Male"
            type: number
            hidden: true
            group_label: "Coaching — Assistant"
          metrics:
            total_pt_asst_coaches_male:
              label: "Total PT Asst Coaches Male"
              type: sum
              sql: ${TABLE}.pt_asst_coaches_male
              round: 0
              group_label: "Coaching — Assistant"
      - name: ft_asst_coaches_female
        meta:
          dimension:
            label: "FT Asst Coaches Female"
            type: number
            hidden: true
            group_label: "Coaching — Assistant"
          metrics:
            total_ft_asst_coaches_female:
              label: "Total FT Asst Coaches Female"
              type: sum
              sql: ${TABLE}.ft_asst_coaches_female
              round: 0
              group_label: "Coaching — Assistant"
      - name: pt_asst_coaches_female
        meta:
          dimension:
            label: "PT Asst Coaches Female"
            type: number
            hidden: true
            group_label: "Coaching — Assistant"
          metrics:
            total_pt_asst_coaches_female:
              label: "Total PT Asst Coaches Female"
              type: sum
              sql: ${TABLE}.pt_asst_coaches_female
              round: 0
              group_label: "Coaching — Assistant"
      - name: total_asst_coaches
        meta:
          dimension:
            label: "Total Asst Coaches"
            type: number
            hidden: true
            group_label: "Coaching — Assistant"
          metrics:
            total_total_asst_coaches:
              label: "Total Total Asst Coaches"
              type: sum
              sql: ${TABLE}.total_asst_coaches
              round: 0
              group_label: "Coaching — Assistant"
      - name: ft_asst_coach_univ_emp_male
        meta:
          dimension:
            label: "FT Asst Coach Univ. Employee Male"
            type: number
            hidden: true
            group_label: "Coaching — Assistant"
          metrics:
            total_ft_asst_coach_univ_emp_male:
              label: "Total FT Asst Coach Univ. Employee Male"
              type: sum
              sql: ${TABLE}.ft_asst_coach_univ_emp_male
              round: 0
              group_label: "Coaching — Assistant"
      - name: pt_asst_coach_univ_emp_male
        meta:
          dimension:
            label: "PT Asst Coach Univ. Employee Male"
            type: number
            hidden: true
            group_label: "Coaching — Assistant"
          metrics:
            total_pt_asst_coach_univ_emp_male:
              label: "Total PT Asst Coach Univ. Employee Male"
              type: sum
              sql: ${TABLE}.pt_asst_coach_univ_emp_male
              round: 0
              group_label: "Coaching — Assistant"
      - name: ft_asst_coach_univ_emp_female
        meta:
          dimension:
            label: "FT Asst Coach Univ. Employee Female"
            type: number
            hidden: true
            group_label: "Coaching — Assistant"
          metrics:
            total_ft_asst_coach_univ_emp_female:
              label: "Total FT Asst Coach Univ. Employee Female"
              type: sum
              sql: ${TABLE}.ft_asst_coach_univ_emp_female
              round: 0
              group_label: "Coaching — Assistant"
      - name: pt_asst_coach_univ_emp_female
        meta:
          dimension:
            label: "PT Asst Coach Univ. Employee Female"
            type: number
            hidden: true
            group_label: "Coaching — Assistant"
          metrics:
            total_pt_asst_coach_univ_emp_female:
              label: "Total PT Asst Coach Univ. Employee Female"
              type: sum
              sql: ${TABLE}.pt_asst_coach_univ_emp_female
              round: 0
              group_label: "Coaching — Assistant"

      # --- Simplified coaching rollups (FT+PT, head+assistant, by coach sex).
      # Excludes university-employee columns (separate axis). Positions, not unique people.
      - name: total_coaches
        meta:
          dimension:
            label: "Total Coaches"
            type: number
            hidden: true
            group_label: "Coaching — Summary"
          metrics:
            coaching_positions:
              label: "Total Coaches"
              type: sum
              sql: ${TABLE}.total_coaches
              round: 0
              group_label: "Coaching — Summary"
      - name: total_coaches_male
        meta:
          dimension:
            label: "Male Coaches"
            type: number
            hidden: true
            group_label: "Coaching — Summary"
          metrics:
            male_coaches:
              label: "Male Coaches"
              type: sum
              sql: ${TABLE}.total_coaches_male
              round: 0
              group_label: "Coaching — Summary"
      - name: total_coaches_female
        meta:
          dimension:
            label: "Female Coaches"
            type: number
            hidden: true
            group_label: "Coaching — Summary"
          metrics:
            female_coaches:
              label: "Female Coaches"
              type: sum
              sql: ${TABLE}.total_coaches_female
              round: 0
              group_label: "Coaching — Summary"
            pct_female_coaches:
              label: "% Female Coaches"
              description: "Female coaching positions as a share of all coaching positions (head + assistant)."
              type: number
              sql: "SUM(COALESCE(${TABLE}.total_coaches_female,0)) / NULLIF(SUM(COALESCE(${TABLE}.total_coaches_male,0) + COALESCE(${TABLE}.total_coaches_female,0)), 0)"
              format: 'percent'
              round: 1
              group_label: "Coaching — Summary"
            pct_female_head_coaches:
              label: "% Female Head Coaches"
              description: "Female head-coach positions as a share of all head-coach positions."
              type: number
              sql: "SUM(COALESCE(${TABLE}.head_coaches_female,0)) / NULLIF(SUM(COALESCE(${TABLE}.head_coaches_male,0) + COALESCE(${TABLE}.head_coaches_female,0)), 0)"
              format: 'percent'
              round: 1
              group_label: "Coaching — Summary"
      - name: head_coaches_male
        meta:
          dimension:
            label: "Male Head Coaches"
            type: number
            hidden: true
            group_label: "Coaching — Summary"
          metrics:
            male_head_coaches:
              label: "Male Head Coaches"
              type: sum
              sql: ${TABLE}.head_coaches_male
              round: 0
              group_label: "Coaching — Summary"
      - name: head_coaches_female
        meta:
          dimension:
            label: "Female Head Coaches"
            type: number
            hidden: true
            group_label: "Coaching — Summary"
          metrics:
            female_head_coaches:
              label: "Female Head Coaches"
              type: sum
              sql: ${TABLE}.head_coaches_female
              round: 0
              group_label: "Coaching — Summary"
      - name: asst_coaches_male
        meta:
          dimension:
            label: "Male Assistant Coaches"
            type: number
            hidden: true
            group_label: "Coaching — Summary"
          metrics:
            male_asst_coaches:
              label: "Male Assistant Coaches"
              type: sum
              sql: ${TABLE}.asst_coaches_male
              round: 0
              group_label: "Coaching — Summary"
      - name: asst_coaches_female
        meta:
          dimension:
            label: "Female Assistant Coaches"
            type: number
            hidden: true
            group_label: "Coaching — Summary"
          metrics:
            female_asst_coaches:
              label: "Female Assistant Coaches"
              type: sum
              sql: ${TABLE}.asst_coaches_female
              round: 0
              group_label: "Coaching — Summary"
